  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
  // Runs briefly on load to hide a leftover Lovable badge if present,
  // then stops — no need to poll the DOM for the lifetime of the page.
  let hideAttempts = 0;
  const hide = () => {
    const badge = document.querySelector('[data-lovable]') ||
                  document.querySelector('iframe[src*="lovable"]') ||
                  document.querySelector('div[id*="lovable"]');
    if (badge) {
      badge.style.display = 'none';
      clearInterval(hideTimer);
      return;
    }
    hideAttempts += 1;
    if (hideAttempts > 20) clearInterval(hideTimer); // stop after ~10s
  };
  const hideTimer = setInterval(hide, 500);
</script>
